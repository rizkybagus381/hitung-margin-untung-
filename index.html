<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Margin Kopi</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel untuk JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <!-- Script Aplikasi (Type module & text/babel) -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useEffect } = React;

    // --- ICONS (Menggantikan lucide-react agar bisa jalan di 1 file HTML) ---
    const Coffee = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>;
    const Database = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
    const Loader2 = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Package = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 42EYHgEzWEdjJgYKAu8VjC4DohVYUMbvZ6Ua45MgSaYBTFv3725expKB69YsjM6Utj99E6Sn3LpcxQ4mNrwfrJLM5NGbWiQ 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
    const Percent = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>;
    const Plus = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const X = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const Save = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const Edit2 = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
    const Trash2 = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;


    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBPzVaOwVo7Vny6Zd1Hfuyn21neRAH5GQs",
      authDomain: "absen-fa8b4.firebaseapp.com",
      projectId: "absen-fa8b4",
      storageBucket: "absen-fa8b4.firebasestorage.app",
      messagingSenderId: "186875255423",
      appId: "1:186875255423:web:515159bf18f393de28fd4a",
      measurementId: "G-M8P1JXK4XZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const currentAppId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'kalkulator-kopi';

    // Format Rupiah
    const formatRupiah = (number) => {
      return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
      }).format(number);
    };

    function App() {
      const [activeTab, setActiveTab] = useState('menu');
      
      const [user, setUser] = useState(null);
      const [loadingDb, setLoadingDb] = useState(true);

      const [ingredients, setIngredients] = useState([]);
      const [menus, setMenus] = useState([]);

      const [newIngredient, setNewIngredient] = useState({ name: '', quantity: '', unit: 'gr', price: '' });
      const [editingIngredientId, setEditingIngredientId] = useState(null);
      const [editIngredientForm, setEditIngredientForm] = useState({ name: '', quantity: '', unit: '', price: '' });

      const [editingMenuId, setEditingMenuId] = useState(null);
      const [menuForm, setMenuForm] = useState({ name: '', sellPrice: '' });
      const [recipeForm, setRecipeForm] = useState({ ingredientId: '', amount: '' });

      // 1. INIT FIREBASE AUTH
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error("Gagal login anonim ke Firebase:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      // 2. FETCH DATA
      useEffect(() => {
        if (!user) return;

        const ingRef = collection(db, 'artifacts', currentAppId, 'users', user.uid, 'ingredients');
        const menuRef = collection(db, 'artifacts', currentAppId, 'users', user.uid, 'menus');

        let loadedIng = false;
        let loadedMenu = false;

        const checkLoading = () => {
          if (loadedIng && loadedMenu) setLoadingDb(false);
        }

        const unsubIng = onSnapshot(ingRef, (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setIngredients(data);
          loadedIng = true;
          checkLoading();
        }, (err) => console.error("Error fetching ingredients:", err));

        const unsubMenu = onSnapshot(menuRef, (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setMenus(data);
          loadedMenu = true;
          checkLoading();
        }, (err) => console.error("Error fetching menus:", err));

        return () => {
          unsubIng();
          unsubMenu();
        };
      }, [user]);

      // FUNGSI HELPER PATH
      const getIngDoc = (id) => doc(db, 'artifacts', currentAppId, 'users', user.uid, 'ingredients', String(id));
      const getMenuDoc = (id) => doc(db, 'artifacts', currentAppId, 'users', user.uid, 'menus', String(id));

      // --- FUNGSI BAHAN BAKU ---
      const handleAddIngredient = async (e) => {
        e.preventDefault();
        if (!newIngredient.name || !newIngredient.quantity || !newIngredient.price || !user) return;
        
        const id = Date.now().toString();
        const data = {
          name: newIngredient.name,
          quantity: parseFloat(newIngredient.quantity),
          unit: newIngredient.unit,
          price: parseFloat(newIngredient.price)
        };
        
        await setDoc(getIngDoc(id), data);
        setNewIngredient({ name: '', quantity: '', unit: 'gr', price: '' });
      };

      const handleDeleteIngredient = async (id) => {
        if (!user) return;
        await deleteDoc(getIngDoc(id));
        
        const batchMenus = menus.filter(m => m.recipe.some(r => String(r.ingredientId) === String(id)));
        for (const menu of batchMenus) {
          const updatedRecipe = menu.recipe.filter(r => String(r.ingredientId) !== String(id));
          await setDoc(getMenuDoc(menu.id), { ...menu, recipe: updatedRecipe }, { merge: true });
        }
      };

      const startEditIngredient = (ing) => {
        setEditingIngredientId(ing.id);
        setEditIngredientForm({ name: ing.name, quantity: ing.quantity, unit: ing.unit, price: ing.price });
      };

      const cancelEditIngredient = () => {
        setEditingIngredientId(null);
      };

      const saveEditIngredient = async (id) => {
        if (!user) return;
        const data = {
          name: editIngredientForm.name,
          quantity: parseFloat(editIngredientForm.quantity) || 0,
          unit: editIngredientForm.unit,
          price: parseFloat(editIngredientForm.price) || 0
        };
        await setDoc(getIngDoc(id), data, { merge: true });
        setEditingIngredientId(null);
      };

      // --- FUNGSI MENU & RESEP ---
      const handleAddMenu = async () => {
        if (!user) return;
        const id = Date.now().toString();
        const newMenu = {
          name: 'Menu Baru',
          sellPrice: 15000,
          recipe: []
        };
        await setDoc(getMenuDoc(id), newMenu);
        setEditingMenuId(id);
        setMenuForm({ name: newMenu.name, sellPrice: newMenu.sellPrice });
      };

      const handleSaveMenu = async (id) => {
        if (!user) return;
        await setDoc(getMenuDoc(id), {
          name: menuForm.name,
          sellPrice: parseFloat(menuForm.sellPrice) || 0
        }, { merge: true });
        setEditingMenuId(null);
      };

      const handleDeleteMenu = async (id) => {
        if (!user) return;
        await deleteDoc(getMenuDoc(id));
      };

      const handleAddRecipeItem = async (menuId) => {
        if (!user || !recipeForm.ingredientId || !recipeForm.amount) return;
        
        const menu = menus.find(m => m.id === menuId);
        if (!menu) return;

        const newRecipeItem = {
          id: Date.now().toString(),
          ingredientId: recipeForm.ingredientId,
          amount: parseFloat(recipeForm.amount)
        };

        const updatedRecipe = [...(menu.recipe || []), newRecipeItem];
        await setDoc(getMenuDoc(menuId), { recipe: updatedRecipe }, { merge: true });
        setRecipeForm({ ingredientId: '', amount: '' });
      };

      const handleDeleteRecipeItem = async (menuId, recipeItemId) => {
        if (!user) return;
        
        const menu = menus.find(m => m.id === menuId);
        if (!menu) return;

        const updatedRecipe = menu.recipe.filter(r => String(r.id) !== String(recipeItemId));
        await setDoc(getMenuDoc(menuId), { recipe: updatedRecipe }, { merge: true });
      };

      const calculateMenuModal = (recipe) => {
        if (!recipe) return 0;
        return recipe.reduce((total, item) => {
          const ingredient = ingredients.find(ing => String(ing.id) === String(item.ingredientId));
          if (ingredient) {
            const costPerUnit = ingredient.price / ingredient.quantity;
            return total + (costPerUnit * item.amount);
          }
          return total;
        }, 0);
      };

      // SEEDER DATA PDF
      const loadSampleData = async () => {
        if (!user) return;
        setLoadingDb(true);
        
        const sampleIngredients = [
          { id: 'ing_1', name: 'Biji Kopi Robusta', quantity: 1000, unit: 'gr', price: 185000 },
          { id: 'ing_2', name: 'Susu UHT Indomilk', quantity: 950, unit: 'ml', price: 22000 },
          { id: 'ing_3', name: 'Gula Aren', quantity: 1000, unit: 'gr', price: 39980 },
          { id: 'ing_4', name: 'SKM Carnation', quantity: 488, unit: 'gr', price: 18000 },
          { id: 'ing_5', name: 'Creamer', quantity: 1000, unit: 'gr', price: 55000 },
          { id: 'ing_6', name: 'Cup PP Injection + Tutup', quantity: 25, unit: 'pcs', price: 26000 },
          { id: 'ing_7', name: 'Sedotan Hitam', quantity: 250, unit: 'pcs', price: 10980 },
          { id: 'ing_8', name: 'Es Batu Kristal', quantity: 10000, unit: 'gr', price: 20000 },
        ];

        const sampleMenus = [
          {
            id: 'menu_1',
            name: 'Es Kopi Gula Aren',
            sellPrice: 23000,
            recipe: [
              { id: 'r_1', ingredientId: 'ing_1', amount: 18 },
              { id: 'r_2', ingredientId: 'ing_2', amount: 100 },
              { id: 'r_3', ingredientId: 'ing_3', amount: 20 },
              { id: 'r_4', ingredientId: 'ing_5', amount: 10 },
              { id: 'r_5', ingredientId: 'ing_6', amount: 1 },
              { id: 'r_6', ingredientId: 'ing_7', amount: 1 },
              { id: 'r_7', ingredientId: 'ing_8', amount: 150 },
            ]
          }
        ];

        try {
          for (const ing of sampleIngredients) {
            await setDoc(getIngDoc(ing.id), { name: ing.name, quantity: ing.quantity, unit: ing.unit, price: ing.price });
          }
          for (const menu of sampleMenus) {
            await setDoc(getMenuDoc(menu.id), { name: menu.name, sellPrice: menu.sellPrice, recipe: menu.recipe });
          }
        } catch (err) {
          console.error("Gagal memuat data contoh", err);
        }
        setLoadingDb(false);
      };

      if (loadingDb) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center font-sans text-slate-600 gap-3">
            <Loader2 className="animate-spin text-amber-600" size={40} />
            <p className="font-medium animate-pulse">Menghubungkan ke Database...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
          <div className="max-w-6xl mx-auto">
            
            {/* Header */}
            <div className="mb-8 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
              <div>
                <h1 className="text-3xl font-bold text-slate-800 flex items-center justify-center md:justify-start gap-2">
                  <Coffee className="text-amber-700" size={32} />
                  Kalkulator Margin Kedai Kopi
                </h1>
                <p className="text-slate-500 mt-2 flex items-center justify-center md:justify-start gap-2">
                  Hitung Total Modal, Laba, dan Margin % sesuai standar F&B. 
                  <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-full flex items-center gap-1 font-bold">
                    <Database size={12} /> Tersimpan Otomatis
                  </span>
                </p>
              </div>
              
              {ingredients.length === 0 && menus.length === 0 && (
                 <button 
                   onClick={loadSampleData}
                   className="bg-amber-100 text-amber-800 hover:bg-amber-200 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2"
                 >
                   <Database size={16} /> Muat Data Contoh PDF
                 </button>
              )}
            </div>

            {/* Tab Navigation */}
            <div className="flex gap-2 mb-6 border-b border-gray-200">
              <button
                onClick={() => setActiveTab('menu')}
                className={`py-2 px-4 font-semibold rounded-t-lg transition-colors ${
                  activeTab === 'menu' ? 'bg-amber-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                }`}
              >
                Kalkulator Menu & Margin
              </button>
              <button
                onClick={() => setActiveTab('ingredients')}
                className={`py-2 px-4 font-semibold rounded-t-lg transition-colors ${
                  activeTab === 'ingredients' ? 'bg-amber-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                }`}
              >
                Database Bahan Baku
              </button>
            </div>

            {/* TAB 1: KALKULATOR MENU */}
            {activeTab === 'menu' && (
              <div className="space-y-6">
                
                {/* Tabel Kesimpulan (Sesuai PDF Halaman 9) */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <Percent size={24} className="text-emerald-600" />
                    Tabel Simulasi Margin & Untung
                  </h2>
                  <table className="w-full min-w-[700px] text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100 text-slate-700 text-sm">
                        <th className="p-3 rounded-tl-lg">Nama Menu</th>
                        <th className="p-3">Total Modal</th>
                        <th className="p-3">Harga Jual</th>
                        <th className="p-3">Untung (Laba)</th>
                        <th className="p-3 rounded-tr-lg">Margin %</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {menus.map((menu) => {
                        const totalModal = calculateMenuModal(menu.recipe);
                        const untung = menu.sellPrice - totalModal;
                        const margin = menu.sellPrice > 0 ? ((untung / menu.sellPrice) * 100).toFixed(0) : 0;
                        
                        return (
                          <tr key={`summary-${menu.id}`} className="hover:bg-slate-50 transition-colors">
                            <td className="p-3 font-semibold">{menu.name}</td>
                            <td className="p-3 text-red-600 font-medium">{formatRupiah(totalModal)}</td>
                            <td className="p-3 text-blue-600 font-medium">{formatRupiah(menu.sellPrice)}</td>
                            <td className="p-3 text-emerald-600 font-bold">{formatRupiah(untung)}</td>
                            <td className="p-3">
                              <span className={`px-2 py-1 rounded text-sm font-bold ${margin >= 70 ? 'bg-emerald-100 text-emerald-700' : margin >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>
                                {margin}%
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                      {menus.length === 0 && (
                        <tr>
                          <td colSpan="5" className="p-4 text-center text-gray-500">Belum ada menu yang ditambahkan.</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>

                {/* List Menu untuk Edit Resep */}
                <div className="flex justify-between items-center mb-4 mt-8">
                  <h2 className="text-xl font-bold text-slate-800">Detail Resep & Harga Menu</h2>
                  <button 
                    onClick={handleAddMenu}
                    className="bg-slate-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-700 transition"
                  >
                    <Plus size={18} /> Tambah Menu Baru
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {menus.map((menu) => {
                    const totalModal = calculateMenuModal(menu.recipe);
                    const isEditing = editingMenuId === menu.id;

                    return (
                      <div key={menu.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        {/* Menu Header */}
                        <div className="bg-amber-50 p-4 border-b border-amber-100 flex justify-between items-start">
                          {isEditing ? (
                            <div className="w-full space-y-3">
                              <input 
                                type="text" 
                                value={menuForm.name}
                                onChange={(e) => setMenuForm({...menuForm, name: e.target.value})}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-amber-500 outline-none"
                                placeholder="Nama Menu"
                              />
                              <div className="flex items-center gap-2">
                                <span className="text-sm font-semibold text-gray-600">Harga Jual:</span>
                                <input 
                                  type="number" 
                                  value={menuForm.sellPrice}
                                  onChange={(e) => setMenuForm({...menuForm, sellPrice: e.target.value})}
                                  className="flex-1 p-2 border rounded focus:ring-2 focus:ring-amber-500 outline-none"
                                  placeholder="Harga Jual"
                                />
                              </div>
                              <div className="flex justify-end gap-2">
                                <button onClick={() => setEditingMenuId(null)} className="p-2 text-gray-500 hover:bg-gray-200 rounded">
                                  <X size={18} />
                                </button>
                                <button onClick={() => handleSaveMenu(menu.id)} className="p-2 text-white bg-emerald-600 hover:bg-emerald-700 rounded flex items-center gap-1">
                                  <Save size={18} /> Simpan
                                </button>
                              </div>
                            </div>
                          ) : (
                            <>
                              <div>
                                <h3 className="text-lg font-bold text-slate-800">{menu.name}</h3>
                                <p className="text-sm text-blue-600 font-semibold mt-1">Jual: {formatRupiah(menu.sellPrice)}</p>
                                <p className="text-sm text-red-600 font-semibold mt-1">Modal: {formatRupiah(totalModal)}</p>
                              </div>
                              <div className="flex gap-2">
                                <button 
                                  onClick={() => {
                                    setEditingMenuId(menu.id);
                                    setMenuForm({ name: menu.name, sellPrice: menu.sellPrice });
                                  }} 
                                  className="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition"
                                >
                                  <Edit2 size={18} />
                                </button>
                                <button 
                                  onClick={() => handleDeleteMenu(menu.id)} 
                                  className="p-1.5 text-red-600 hover:bg-red-50 rounded transition"
                                >
                                  <Trash2 size={18} />
                                </button>
                              </div>
                            </>
                          )}
                        </div>

                        {/* Resep Builder */}
                        <div className="p-4">
                          <h4 className="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">Komposisi Bahan</h4>
                          
                          <ul className="space-y-2 mb-4">
                            {(menu.recipe || []).map(item => {
                              const ingredient = ingredients.find(i => String(i.id) === String(item.ingredientId));
                              if (!ingredient) return null;
                              const cost = (ingredient.price / ingredient.quantity) * item.amount;
                              
                              return (
                                <li key={item.id} className="flex justify-between items-center text-sm p-2 bg-slate-50 rounded border border-slate-100">
                                  <div className="flex flex-col">
                                    <span className="font-medium text-slate-700">{ingredient.name}</span>
                                    <span className="text-xs text-slate-500">{item.amount} {ingredient.unit}</span>
                                  </div>
                                  <div className="flex items-center gap-3">
                                    <span className="font-semibold text-slate-700">{formatRupiah(cost)}</span>
                                    <button 
                                      onClick={() => handleDeleteRecipeItem(menu.id, item.id)}
                                      className="text-red-400 hover:text-red-600"
                                    >
                                      <X size={16} />
                                    </button>
                                  </div>
                                </li>
                              );
                            })}
                            {(!menu.recipe || menu.recipe.length === 0) && (
                              <p className="text-sm text-gray-400 italic">Belum ada bahan ditambahkan.</p>
                            )}
                          </ul>

                          <div className="flex gap-2 items-end mt-4 border-t pt-4">
                            <div className="flex-1">
                              <label className="text-xs text-gray-500 block mb-1">Pilih Bahan</label>
                              <select 
                                className="w-full p-2 border rounded bg-white text-sm outline-none focus:border-amber-500"
                                value={recipeForm.ingredientId}
                                onChange={(e) => setRecipeForm({...recipeForm, ingredientId: e.target.value})}
                              >
                                <option value="">-- Pilih --</option>
                                {ingredients.map(ing => (
                                  <option key={ing.id} value={ing.id}>{ing.name}</option>
                                ))}
                              </select>
                            </div>
                            <div className="w-24">
                              <label className="text-xs text-gray-500 block mb-1">Takaran</label>
                              <input 
                                type="number" 
                                placeholder="0"
                                className="w-full p-2 border rounded text-sm outline-none focus:border-amber-500"
                                value={recipeForm.amount}
                                onChange={(e) => setRecipeForm({...recipeForm, amount: e.target.value})}
                              />
                            </div>
                            <button 
                              onClick={() => handleAddRecipeItem(menu.id)}
                              className="bg-slate-200 text-slate-700 p-2 rounded hover:bg-amber-500 hover:text-white transition"
                            >
                              <Plus size={20} />
                            </button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* TAB 2: BAHAN BAKU */}
            {activeTab === 'ingredients' && (
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <Package size={24} className="text-blue-600" />
                    Tambah Bahan Baku Baru
                  </h2>
                  <form onSubmit={handleAddIngredient} className="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                    <div className="md:col-span-2">
                      <label className="block text-sm font-medium text-gray-700 mb-1">Nama Bahan</label>
                      <input 
                        type="text" 
                        placeholder="Contoh: Susu UHT Diamond"
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={newIngredient.name}
                        onChange={(e) => setNewIngredient({...newIngredient, name: e.target.value})}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Isi/Kemasan</label>
                      <input 
                        type="number" 
                        placeholder="1000"
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={newIngredient.quantity}
                        onChange={(e) => setNewIngredient({...newIngredient, quantity: e.target.value})}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Satuan</label>
                      <select 
                        className="w-full p-2.5 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none"
                        value={newIngredient.unit}
                        onChange={(e) => setNewIngredient({...newIngredient, unit: e.target.value})}
                      >
                        <option value="gr">Gram (gr)</option>
                        <option value="ml">Mililiter (ml)</option>
                        <option value="pcs">Pieces (pcs)</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Harga Beli Total</label>
                      <input 
                        type="number" 
                        placeholder="20000"
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={newIngredient.price}
                        onChange={(e) => setNewIngredient({...newIngredient, price: e.target.value})}
                      />
                    </div>
                    <div className="md:col-span-5 flex justify-end mt-2">
                      <button 
                        type="submit" 
                        className="bg-blue-600 text-white px-6 py-2.5 rounded-lg flex items-center gap-2 hover:bg-blue-700 transition font-medium"
                      >
                        <Plus size={18} /> Simpan Bahan
                      </button>
                    </div>
                  </form>
                </div>

                <div className="bg-white p-0 rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-100 text-slate-700 text-sm">
                          <th className="p-4">Nama Bahan</th>
                          <th className="p-4">Ukuran Kemasan</th>
                          <th className="p-4">Harga Beli</th>
                          <th className="p-4 bg-blue-50">HPP / Satuan Dasar</th>
                          <th className="p-4 text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {ingredients.map((ing) => {
                          const costPerUnit = ing.price / ing.quantity;
                          const isEditing = editingIngredientId === ing.id;

                          if (isEditing) {
                            return (
                              <tr key={`edit-${ing.id}`} className="bg-blue-50 text-sm">
                                <td className="p-4">
                                  <input
                                    type="text"
                                    className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={editIngredientForm.name}
                                    onChange={(e) => setEditIngredientForm({...editIngredientForm, name: e.target.value})}
                                  />
                                </td>
                                <td className="p-4 flex items-center gap-2">
                                  <input
                                    type="number"
                                    className="w-16 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={editIngredientForm.quantity}
                                    onChange={(e) => setEditIngredientForm({...editIngredientForm, quantity: e.target.value})}
                                  />
                                  <select
                                    className="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                    value={editIngredientForm.unit}
                                    onChange={(e) => setEditIngredientForm({...editIngredientForm, unit: e.target.value})}
                                  >
                                    <option value="gr">gr</option>
                                    <option value="ml">ml</option>
                                    <option value="pcs">pcs</option>
                                  </select>
                                </td>
                                <td className="p-4">
                                  <input
                                    type="number"
                                    className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={editIngredientForm.price}
                                    onChange={(e) => setEditIngredientForm({...editIngredientForm, price: e.target.value})}
                                  />
                                </td>
                                <td className="p-4 text-gray-400 text-xs italic">
                                  HPP Otomatis...
                                </td>
                                <td className="p-4 text-center">
                                  <div className="flex items-center justify-center gap-2">
                                    <button
                                      onClick={() => saveEditIngredient(ing.id)}
                                      className="text-white bg-emerald-500 hover:bg-emerald-600 p-1.5 rounded transition"
                                      title="Simpan"
                                    >
                                      <Save size={18} />
                                    </button>
                                    <button
                                      onClick={cancelEditIngredient}
                                      className="text-white bg-gray-400 hover:bg-gray-500 p-1.5 rounded transition"
                                      title="Batal"
                                    >
                                      <X size={18} />
                                    </button>
                                  </div>
                                </td>
                              </tr>
                            );
                          }

                          return (
                            <tr key={ing.id} className="hover:bg-slate-50 transition-colors text-sm">
                              <td className="p-4 font-medium text-slate-800">{ing.name}</td>
                              <td className="p-4">{ing.quantity} {ing.unit}</td>
                              <td className="p-4">{formatRupiah(ing.price)}</td>
                              <td className="p-4 bg-blue-50/30 font-semibold text-blue-700">
                                {formatRupiah(costPerUnit)} / {ing.unit}
                              </td>
                              <td className="p-4 text-center">
                                <div className="flex items-center justify-center gap-2">
                                  <button
                                    onClick={() => startEditIngredient(ing)}
                                    className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-1.5 rounded transition"
                                    title="Edit"
                                  >
                                    <Edit2 size={18} />
                                  </button>
                                  <button
                                    onClick={() => handleDeleteIngredient(ing.id)}
                                    className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition"
                                    title="Hapus"
                                  >
                                    <Trash2 size={18} />
                                  </button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                        {ingredients.length === 0 && (
                          <tr>
                            <td colSpan="5" className="p-8 text-center text-gray-500">
                              Belum ada bahan baku. Silakan tambahkan di atas atau gunakan "Muat Data Contoh".
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
